# ==============================================================================
# netapp-cluster-v3.4.conf
# Configuration for netapp-2node-setup.sh
#
# VERSION HISTORY
# ------------------------------------------------------------------------------
# v3.4.0  2026-04-20  Removed IPSPACE_NAME, FAILOVER_GROUP_* (Default ipspace)
# v3.3.0  2026-04-16  Synchronized variable names with script v3.3.0
# v3.2.0  (original)
# ==============================================================================

# --- SSH / Connection ---
CLUSTER_MGMT_IP="192.168.1.22"
NETAPP_USER="admin"

# --- Logging / runtime ---
LOG_DIR="./logs"
COLOR_MODE="auto"

# --- Cluster objects ---
BROADCAST_DOMAIN_CIFS="bd_cifs"
BROADCAST_DOMAIN_VLAN20="bd_vlan20"
CIFS_MTU="1500"
NFS_ISCSI_MTU="9000"
VLAN_ID="20"

# --- NTP ---
# Script processes all servers in the array
NTP_SERVERS=("192.168.1.1")

# --- Nodes ---
NODES=("lab-clus01-01" "lab-clus01-02")

# --- Base ports ---
CIFS_HOME_PORT="e0e"
VLAN20_BASE_PORT="e0d"

# --- Aggregate settings ---
AGGR_DISKCOUNT=8
AGGR_PREFIX="aggr_data"
AGGR_RAIDTYPE="raid_dp"
AGGR_SPARE_RESERVE="1"               # Minimum number of spare disks left per node

# --- Vservers - base names ---
VSERVER_BASE_cifs="svm_cifs01"
VSERVER_BASE_nfs="svm_nfs01"
VSERVER_BASE_iscsi="svm_iscsi01"

# --- Protocol enablement ---
VSERVER_PROTOCOLS_cifs="cifs"
VSERVER_PROTOCOLS_nfs="nfs"
VSERVER_PROTOCOLS_iscsi="iscsi"

# --- Start IPs; script increments by 1 for each new LIF ---
CIFS_START_IP="192.168.1.25"
NFS_ISCSI_START_IP="192.168.20.25"
LIF_NETMASK_CIFS="255.255.255.0"
LIF_NETMASK_NFS_ISCSI="255.255.255.0"

# --- Excluded IP addresses (skipped during IP assignment) ---
# Use a Bash array or a comma-separated string.
# Array example:
# EXCLUDED_IPS=("192.168.1.25" "192.168.1.26")
# String example:
# EXCLUDED_IPS="192.168.1.25,192.168.1.26"
EXCLUDED_IPS=("192.168.1.25" "192.168.1.26")

# --- Volumes ---
VOLUMES_PER_SVM="2"
VOL_SIZE="100G"
VOL_PREFIX="vol"
JUNCTION_BASE="/"

# --- Export policy ---
EXPORT_CLIENTMATCH="0.0.0.0/0"
EXPORT_RORULE="any"
EXPORT_RWRULE="any"
