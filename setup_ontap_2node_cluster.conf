# ==============================================================================
# netapp-cluster-v3.2.conf
# Configuratie voor netapp-2node-setup.sh
#
# VERSIE BEHEER
# ------------------------------------------------------------------------------
# v3.3.0  2026-04-16  Variabelenamen gesynchroniseerd met script v3.3.0:
#                       - SSH_USER hernoemd naar NETAPP_USER
#                       - NTP_SERVERS array correct (NTP_VERSION verwijderd)
#                       - COLOR_OUTPUT hernoemd naar COLOR_MODE
#                       - AGGR_RAIDTYPE en AGGR_SPARE_RESERVE toegevoegd
# v3.2.0  (origineel)
# ==============================================================================

# --- SSH / Verbinding ---
CLUSTER_MGMT_IP="192.168.1.22"
NETAPP_USER="admin"                    # Was: SSH_USER (niet herkend door script)

# --- Logging / runtime ---
LOG_DIR="./logs"
COLOR_MODE="auto"                      # Was: COLOR_OUTPUT (niet herkend door script)

# --- Cluster objecten ---
IPSPACE_NAME="ipspace_data"
BROADCAST_DOMAIN_CIFS="bd_cifs"
BROADCAST_DOMAIN_VLAN20="bd_vlan20"
FAILOVER_GROUP_CIFS="fg_cifs"
FAILOVER_GROUP_VLAN20="fg_vlan20"
CIFS_MTU="1500"
NFS_ISCSI_MTU="9000"
VLAN_ID="20"

# --- NTP ---
# NTP_VERSION verwijderd: niet relevant voor ONTAP CLI
# Script verwerkt alle servers in de array
NTP_SERVERS=("192.168.1.1")

# --- Nodes ---
NODES=("lab-clus01-01" "lab-clus01-02")

# --- Basispoorten ---
CIFS_HOME_PORT="e0e"
VLAN20_BASE_PORT="e0d"

# --- Aggregate settings ---
AGGR_DISKCOUNT=8
AGGR_PREFIX="aggr_data"
AGGR_RAIDTYPE="raid_dp"               # Nieuw: wordt doorgegeven aan aggregate create
AGGR_SPARE_RESERVE="1"               # Nieuw: minimaal aantal spare disks dat overblijft per node

# --- Vservers - basisnamen; script nummert automatisch op als naam al bestaat ---
VSERVER_BASE_cifs="svm_cifs01"
VSERVER_BASE_nfs="svm_nfs01"
VSERVER_BASE_iscsi="svm_iscsi01"

# --- Protocol enablement ---
VSERVER_PROTOCOLS_cifs="cifs"
VSERVER_PROTOCOLS_nfs="nfs"
VSERVER_PROTOCOLS_iscsi="iscsi"

# --- Start IP's; script telt per nieuwe LIF automatisch op met 1 ---
CIFS_START_IP="192.168.1.25"
NFS_ISCSI_START_IP="192.168.20.25"
LIF_NETMASK_CIFS="255.255.255.0"
LIF_NETMASK_NFS_ISCSI="255.255.255.0"

# --- Uitgesloten IP-adressen (worden overgeslagen bij IP-toewijzing) ---
# Je kunt een Bash-array gebruiken of een komma-gescheiden string.
# Voorbeeld array:
# EXCLUDED_IPS=("192.168.1.25" "192.168.1.26")
# Voorbeeld string:
# EXCLUDED_IPS="192.168.1.25,192.168.1.26"
EXCLUDED_IPS=("192.168.1.25" "192.168.1.26")

# --- Volumes ---
VOLUMES_PER_SVM="2"
VOL_SIZE="100G"
VOL_PREFIX="vol"
JUNCTION_BASE="/"

# --- Export policy ---
EXPORT_CLIENTMATCH="0.0.0.0/0"
EXPORT_RORULE="any"
EXPORT_RWRULE="any"
